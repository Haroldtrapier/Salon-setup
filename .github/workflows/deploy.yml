name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}" --scope="team_ZXyf05IJDNHtbMQUQ5Krj8YO"
        env:
          VERCEL_ORG_ID: team_ZXyf05IJDNHtbMQUQ5Krj8YO
          VERCEL_PROJECT_ID: prj_KSwnOGk0C89UrC5oUSnUbyJOy0Qa
